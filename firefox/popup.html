<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 20 20" fill="none">
          <rect x="1" y="1" width="8" height="8" rx="1.5" fill="#6c5ce7"/>
          <rect x="11" y="1" width="8" height="8" rx="1.5" fill="#a29bfe"/>
          <rect x="1" y="11" width="8" height="8" rx="1.5" fill="#a29bfe"/>
          <rect x="11" y="11" width="8" height="8" rx="1.5" fill="#6c5ce7"/>
        </svg>
      </div>
      <h1>Video Frame Grid</h1>
    </div>

    <!-- Domain toggle row -->
    <div class="section">
      <div class="domain-row">
        <div class="domain-info">
          <span class="domain-label">This site</span>
          <span class="domain-name" id="domainName">—</span>
        </div>
        <button class="toggle-btn" id="domainToggle" aria-label="Toggle on this domain">
          <span class="toggle-track">
            <span class="toggle-knob"></span>
          </span>
        </button>
      </div>
      <div class="status-text" id="statusText"></div>
    </div>

    <!-- Regenerate button (only when enabled) -->
    <button class="primary-btn hidden" id="regenerateBtn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1v5h5"/>
        <path d="M3.5 10a5 5 0 1 0 1-7L1 6"/>
      </svg>
      Generate / Refresh Grid
    </button>

    <div class="divider"></div>

    <!-- Interval picker -->
    <div class="section">
      <label class="section-label">Frame interval</label>
      <div class="picker-wrapper">
        <div class="picker-column" id="pickerNumber">
          <div class="picker-scroll" id="scrollNumber"></div>
        </div>
        <div class="picker-column picker-column-unit" id="pickerUnit">
          <div class="picker-scroll" id="scrollUnit"></div>
        </div>
        <div class="picker-highlight"></div>
        <div class="picker-fade picker-fade-top"></div>
        <div class="picker-fade picker-fade-bottom"></div>
      </div>
    </div>

    <button class="secondary-btn hidden" id="recalibrateBtn">Recalibrate Grid</button>

    <div class="divider"></div>

    <!-- Shortcut -->
    <div class="section">
      <label class="section-label">Keyboard shortcut</label>
      <div class="shortcut-row">
        <div class="shortcut-display" id="shortcutDisplay">Loading...</div>
        <button class="icon-btn" id="shortcutEditBtn" title="Customize shortcut">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 1l4 4-9 9H2v-4z"/>
          </svg>
        </button>
      </div>
      <p class="hint">Avoid keys like K, M, J, L, Space, F, C — they conflict with video player controls.</p>
    </div>

    <div class="footer">v1.1.0</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
